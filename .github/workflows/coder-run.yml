name: Coder Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # 2am CT daily

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  find-issues:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.list.outputs.issues }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: List open issues for coder
        id: list
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          # Get open bugs and enhancements, skip breaking and needs-discussion
          candidates=$(gh issue list --repo ${{ github.repository }} --state open --json number,labels --limit 50 \
            | jq -c '[.[] | select(
                (.labels | map(.name) | any(. == "bug" or . == "enhancement" or . == "agent-ok"))
                and (.labels | map(.name) | any(. == "breaking" or . == "needs-discussion" or . == "on-hold") | not)
              ) | .number]')

          # Get issue numbers that already have an open bot PR (from title or body "closes #N" / "fixes #N")
          claimed=$(gh pr list --repo ${{ github.repository }} --state open --author "app/llm-exe-bot" \
            --json title,body --limit 100 \
            | jq -r '.[] | (.title + " " + .body)' \
            | { grep -oiE '(closes|fixes|resolves) #[0-9]+' || true; } \
            | { grep -oE '[0-9]+' || true; } \
            | jq -Rn '[inputs | tonumber]')

          # Filter out issues that already have a PR
          issues=$(echo "$candidates" | jq -c --argjson claimed "$claimed" \
            '[.[] | select(. as $n | $claimed | index($n) | not)] | if length > 5 then .[:5] else . end')

          count=$(echo "$issues" | jq 'length')
          echo "issues=$issues" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count issues to work on (filtered from $(echo "$candidates" | jq 'length') candidates)"

  run-coder:
    needs: find-issues
    if: needs.find-issues.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issues) }}
      max-parallel: 1

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "llm-exe-bot[bot]"
          git config user.email "${{ secrets.APP_ID }}+llm-exe-bot[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prompt
        id: prompt
        run: |
          source ./scripts/agents/config.sh

          branch=$(create_agent_branch "coder" "issue-${{ matrix.issue }}")
          log_file=$(clock_in "coder" "$branch")
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "log_file=$log_file" >> "$GITHUB_OUTPUT"

          prompt_file="./scripts/agents/prompts/coder.md"
          prompt=$(sed -e "s|\$BRANCH|$branch|g" -e "s|\$LOG_FILE|$log_file|g" "$prompt_file")
          prior_context=$(build_prior_context "coder" "$log_file" 2>/dev/null || true)
          prompt="${prompt}${prior_context}"

          deadline="$(date -u -d "+600 seconds" +%H:%M)"
          prompt="${prompt}

          ## Time Budget
          You started at $(date -u +%H:%M) UTC. You have 10 minutes — wrap up by ${deadline} UTC.
          Run \`date -u +%H:%M\` periodically to check how much time you have left.
          If you're running low on time, commit what you have, update your log file, and stop.

          ## Assigned Issue
          You MUST work on issue #${{ matrix.issue }}. Do not pick a different issue. Read it with:
          gh issue view ${{ matrix.issue }}"

          echo "$prompt" > /tmp/agent-prompt.txt

      - name: Run coder
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.bot-token.outputs.token }}
          display_report: "false"
          prompt: |
            Read the file /tmp/agent-prompt.txt for your full instructions. Follow them exactly.
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
            --max-turns 50
            --model claude-opus-4-6

      - name: Clock out
        if: always()
        run: |
          source ./scripts/agents/config.sh
          clock_out "${{ steps.prompt.outputs.log_file }}" "${{ job.status == 'success' && '0' || '1' }}"
