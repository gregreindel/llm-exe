name: Release / Publish

on:
  workflow_dispatch:

  release:
    types:
      - published

permissions:
  id-token: write
  contents: write

jobs:
  check-release-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check if release is from main branch
        if: github.event_name == 'release' && github.event.action == 'published'
        run: |
          BRANCH=$(jq -r .release.target_commitish "$GITHUB_EVENT_PATH")
          if [ "$BRANCH" != "main" ]; then
            echo "Releases should only be created from the main branch. This release is from $BRANCH."
            exit 1
          fi

  run-examples-tests:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    needs: check-release-branch
    name: Run Examples Tests
    runs-on: ubuntu-latest
    environment: Examples Test
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Latest Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Cache npm dependencies
        uses: ./.github/actions/cache

      - name: Install dependencies
        run: npm install

      - name: Build package and pack package
        run: npm run build:package && npm pack

      - name: Copy path of packed package
        run: |
          echo "PACKED_PACKAGE_PATH=$(find . -maxdepth 1 -type f -name 'llm-exe-*.tgz')" >> $GITHUB_ENV

      - name: Extract tarball and replace dist folder
        run: |
          mkdir -p temp_extract
          tar -xzf ${{ env.PACKED_PACKAGE_PATH }} -C temp_extract
          rm -rf dist
          cp -r temp_extract/package/dist .
          rm -rf temp_extract

      - name: Install dependencies in examples directory
        run: cd examples && npm install

      - name: Run examples tests
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096 --experimental-vm-modules"
          npm run test-examples

  publish-npm-package:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    needs: [check-release-branch, run-examples-tests]
    name: Publish Main/Beta Package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Publisher
        run: |
          ALLOWED_PUBLISHERS="gregreindel"
          if [[ ! ",$ALLOWED_PUBLISHERS," =~ ",${{ github.actor }}," ]]; then
            echo "Error: User ${{ github.actor }} is not authorized to publish packages"
            echo "Allowed publishers: $ALLOWED_PUBLISHERS"
            exit 1
          fi
          echo "User ${{ github.actor }} is authorized to publish"

      - name: Setup Node.js environment
        uses: ./.github/actions/setup-node

      - name: Cache npm dependencies
        uses: ./.github/actions/cache

      - name: Install
        run: npm install

      - name: Build package
        run: npm run build:package

      - name: Publish Main/Beta Package version
        id: npm-publish
        run: |
          version=$(node -p "require('./package.json').version")
          # Semver pre-release: anything after a "-" (e.g. 3.0.0-beta.0, 3.0.0-rc.1, 3.0.0-alpha.2).
          # The channel name is the first alphabetic chunk after the "-" and becomes the npm dist-tag.
          # If the version has a "-" but no alphabetic channel (e.g. 3.0.0-1234), refuse to publish —
          # otherwise we'd silently push the pre-release to the "latest" dist-tag.
          if [[ "$version" == *-* ]]; then
            if [[ "$version" =~ -([a-zA-Z]+) ]]; then
              TAG="${BASH_REMATCH[1]}"
              echo "Publishing pre-release version $version with npm dist-tag: $TAG"
              npm publish --provenance --tag "$TAG"
            else
              echo "Error: pre-release version $version has no alphabetic channel (expected -beta.X, -rc.X, -alpha.X, etc.)"
              echo "Refusing to publish to avoid clobbering the 'latest' npm dist-tag."
              exit 1
            fi
          else
            echo "Publishing main version $version"
            npm run publish-main
          fi

  # Reverts the GitHub release back to draft if examples tests or npm publish fail.
  # Runs after both jobs complete (in any state) so it catches failures from either.
  revert-to-draft:
    if: |
      always() &&
      github.event_name == 'release' &&
      (needs.run-examples-tests.result == 'failure' || needs.publish-npm-package.result == 'failure')
    needs: [run-examples-tests, publish-npm-package]
    name: Revert Release to Draft
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Revert release to draft
        run: |
          RELEASE_ID=$(jq -r .release.id "$GITHUB_EVENT_PATH")
          ORIGINAL_BODY=$(jq -r .release.body "$GITHUB_EVENT_PATH")

          if [ "${{ needs.run-examples-tests.result }}" = "failure" ]; then
            FAILURE_REASON="the examples tests failed before publishing"
          else
            FAILURE_REASON="the package failed to publish to npm"
          fi

          echo "Reverting release ID $RELEASE_ID to draft — reason: $FAILURE_REASON"

          cat > release_body.txt <<'EOF'
          > [!WARNING]
          > **Release Publishing Failed**
          > This release has been automatically reverted to draft status because FAILURE_REASON.
          > Please review the [workflow logs](WORKFLOW_URL) and address any issues before attempting to publish again.
          ---
          EOF
          sed -i "s|FAILURE_REASON|$FAILURE_REASON|g" release_body.txt
          sed -i "s|WORKFLOW_URL|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|g" release_body.txt
          echo "$ORIGINAL_BODY" >> release_body.txt

          BODY_JSON=$(jq -Rs '.' < release_body.txt)
          response=$(curl -s -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.bot-token.outputs.token }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID \
            -d "{\"draft\": true, \"body\": ${BODY_JSON}}")
          if echo "$response" | jq -e '.id' > /dev/null; then
            echo "✅ Release reverted to draft with original notes preserved"
          else
            echo "⚠️  Warning: Failed to revert release"
            echo "$response" | jq '.'
          fi
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
