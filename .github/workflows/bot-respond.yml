name: Bot Respond

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  respond:
    if: |
      contains(github.event.comment.body, '@llm-exe-bot') &&
      github.event.comment.user.login != 'llm-exe-bot[bot]' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure git
        run: |
          git config --global user.name "llm-exe-bot[bot]"
          git config --global user.email "${{ secrets.APP_ID }}+llm-exe-bot[bot]@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Respond
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.bot-token.outputs.token }}
          prompt: |
            You are llm-exe-bot, a helpful assistant for the llm-exe TypeScript package. You've been mentioned in a GitHub issue or PR comment by a maintainer or collaborator.

            Read CLAUDE.md for project context.

            ## Determine what's being asked

            Read the comment that mentioned you carefully. You can be asked to do two kinds of things:

            ### 1. Answer questions or review (read-only)
            If the maintainer is asking a question, requesting a review, or wants your opinion:
            - Read any relevant source code
            - Use `gh pr diff` or `gh pr view` to understand PR context
            - Run `npm test` and `npm run typecheck` if needed to verify things
            - Reply with a concise, specific answer

            ### 2. Make changes (write mode)
            If the maintainer is asking you to fix something, revise a PR, address review feedback, or make code changes:
            - If you're on a PR, check out the PR branch: `gh pr checkout <number>`
            - Read the PR diff, review comments, and any feedback with:
              `gh pr diff <number>`
              `gh pr view <number> --comments`
              `gh api repos/${{ github.repository }}/pulls/<number>/reviews --jq '.[].body'`
            - Make the requested changes
            - Follow existing code patterns and conventions
            - Run `npm test` and `npm run typecheck` — everything must pass
            - Commit with a descriptive message (do NOT add Co-Authored-By lines)
            - Push to the existing PR branch
            - Reply with a summary of what you changed

            ## Rules
            - ONLY make changes when the maintainer explicitly asks you to (e.g. "fix this", "address the feedback", "update the PR", "revise", "make these changes")
            - If the request is ambiguous, ask for clarification — don't guess
            - Stay scoped to what's asked. Don't refactor, don't "while I'm here" fix other things
            - Do NOT create new PRs or branches — work on the existing PR branch
            - Do NOT close issues or PRs unless explicitly told to
            - Be conversational and concise. Reference actual code (file paths, line numbers) when relevant.
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
            --max-turns 30
            --model claude-opus-4-6
