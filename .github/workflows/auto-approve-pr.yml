name: Auto Approve PR

# Submits the formal GitHub approval event once a PR has BOTH:
#   1. A high-confidence verdict from the reviewer agent
#      (signaled by the 'reviewer:approved' label applied by agent-review-pr.yml)
#   2. All CI checks passing
#
# Two triggers cover both orderings of review vs CI:
#   - pull_request: labeled  ->  reviewer just applied the label; check if CI already passed
#   - workflow_run: Run Tests completed  ->  CI just finished; check if label was already applied
#
# The actual approval uses GITHUB_TOKEN (github-actions[bot]) because
# llm-exe-bot[bot] cannot approve its own PRs.

on:
  pull_request:
    types: [labeled]
    branches: [development]
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'reviewer:approved') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Resolve PR number
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "Triggered by label event on PR #$PR_NUMBER"
          else
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            echo "Triggered by workflow_run for SHA $HEAD_SHA"
            PR_NUMBER=$(gh pr list \
              --base development \
              --state open \
              --json number,headRefOid,labels \
              --jq "[.[] | select(.headRefOid == \"$HEAD_SHA\" and (.labels | map(.name) | contains([\"reviewer:approved\"])))] | first | .number // empty" \
              --repo ${{ github.repository }})
          fi

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No eligible PR found - skipping."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify checks and approve
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ steps.resolve.outputs.pr_number }}"

          # Confirm the label is still present (prevents duplicate runs)
          HAS_LABEL=$(gh pr view "$PR" \
            --json labels \
            --jq '.labels | map(.name) | contains(["reviewer:approved"])' \
            --repo ${{ github.repository }})
          if [ "$HAS_LABEL" != "true" ]; then
            echo "Label 'reviewer:approved' not found on PR #$PR - already processed or removed."
            exit 0
          fi

          # Verify all CI checks have passed (non-blocking: if pending, just skip)
          if ! gh pr checks "$PR" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Not all checks have passed for PR #$PR - skipping until CI completes."
            exit 0
          fi

          # Remove label first to prevent duplicate runs from concurrent triggers
          gh pr edit "$PR" --remove-label "reviewer:approved" --repo ${{ github.repository }}

          # Submit the approval
          gh pr review "$PR" \
            --approve \
            --body "Approved by reviewer agent (high confidence, all checks passed)." \
            --repo ${{ github.repository }}

          # Mark as non-draft if it is still a draft
          IS_DRAFT=$(gh pr view "$PR" --json isDraft --jq '.isDraft' --repo ${{ github.repository }})
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready "$PR" --repo ${{ github.repository }}
            echo "PR #$PR marked as ready for review."
          fi

          echo "PR #$PR approved."
