name: Draft Dev to Main PR

on:
  pull_request:
    types:
      - closed
    branches:
      - development

  release:
    types: [published]

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  draft-dev-to-main-pr:
    # Run for release events OR when a PR is merged to development (except version bump PRs)
    if: ${{ github.event_name == 'release' || !(github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'development' && github.event.pull_request.head.ref == 'bump-version-branch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get the latest release version
        id: latest_release
        run: |
          git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1
          LATEST_VERSION=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          if [ -z "$LATEST_VERSION" ]; then
            LATEST_VERSION="v0.0.0"
          fi
          # Remove the "v" prefix if it exists
          LATEST_VERSION=${LATEST_VERSION#v}
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Get package.json version
        id: package_version
        run: |
          package_version=$(jq -r '.version' < package.json)
          echo "Version in package.json: $package_version"
          echo "PACKAGE_VERSION=$package_version" >> $GITHUB_ENV

      - name: Check version comparison
        run: |
          LATEST_VERSION=${{ env.LATEST_VERSION }}
          PACKAGE_VERSION=${{ env.PACKAGE_VERSION }}

          # Convert versions to comparable numbers
          convert_version() {
            echo "$1" | awk -F. '{ printf("%d%03d%03d", $1,$2,$3); }'
          }

          LATEST_VERSION_NUM=$(convert_version $LATEST_VERSION)
          PACKAGE_VERSION_NUM=$(convert_version $PACKAGE_VERSION)

          if [ "$PACKAGE_VERSION_NUM" -le "$LATEST_VERSION_NUM" ]; then
            echo "Version in package.json ($PACKAGE_VERSION) is not greater than the latest release tag ($LATEST_VERSION)."
            echo "CURRENT_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
            echo "BUMP_VERSION=true" >> $GITHUB_ENV
          else
            echo "Version in package.json ($PACKAGE_VERSION) is greater than or equal to the latest release tag ($LATEST_VERSION)"
            echo "CURRENT_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
            echo "BUMP_VERSION=false" >> $GITHUB_ENV
          fi

      - name: Determine next semantic version for release
        run: |
          LATEST_TAG=${{ env.CURRENT_VERSION }}
          if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v${{ env.PACKAGE_VERSION }}"
          fi

          if [[ $LATEST_TAG =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(.*)$ ]]; then
          MAJOR=${BASH_REMATCH[1]}
          MINOR=${BASH_REMATCH[2]}
          PATCH=${BASH_REMATCH[3]}
          else
          echo "Invalid version format. Expected format: MAJOR.MINOR.PATCH"
          exit 1
          fi
          # if env.BUMP_VERSION == 'false', dont increase patch by 1 else do
          if [ "${{ env.BUMP_VERSION }}" == 'false' ]; then
            PATCH=$PATCH
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Check if PR already exists
        id: check_pr
        run: |
          PR_URL=$(gh pr list --base main --head development --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "PR_EXISTS=false" >> $GITHUB_ENV
          else
            echo "PR_EXISTS=true" >> $GITHUB_ENV
            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          fi

      - name: Get merged PR titles for release
        id: get_pr_titles
        run: |
          # Fetch branches with error handling
          echo "Fetching branches..."
          if ! git fetch origin main development; then
            echo "Error: Failed to fetch branches"
            exit 1
          fi
          
          # Find the merge base between main and development
          MERGE_BASE=$(git merge-base origin/main origin/development)
          echo "Merge base: $MERGE_BASE"
          
          # Get PR numbers from merge commits
          PR_NUMBERS=$(git log $MERGE_BASE..origin/development --merges --pretty=format:"%s" | grep -oP 'Merge pull request #\K[0-9]+') || true
          
          # Initialize PR_TITLES
          PR_TITLES=""
          
          # Fetch PR details for each PR number
          if [ -n "$PR_NUMBERS" ]; then
            while IFS= read -r pr_num; do
              if [ -n "$pr_num" ]; then
                # Fetch PR info with error handling
                if pr_info=$(gh pr view "$pr_num" --json number,title --jq '"- #\(.number): \(.title)"' 2>/dev/null); then
                  PR_TITLES="${PR_TITLES}${pr_info}\n"
                else
                  echo "Warning: Could not fetch details for PR #$pr_num"
                fi
              fi
            done <<< "$PR_NUMBERS"
          fi
          
          # Count PRs for logging
          if [ -n "$PR_TITLES" ]; then
            PR_COUNT=$(echo -e "$PR_TITLES" | grep -c "^- #" || echo "0")
            echo "Found $PR_COUNT PRs to include in release"
          else
            echo "No PRs found between main and development"
            PR_COUNT=0
          fi
          
          # Always set PR_TITLES (even if empty) to avoid undefined variable issues
          echo "PR_TITLES<<EOF" >> $GITHUB_ENV
          echo -e "$PR_TITLES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "PR_COUNT=$PR_COUNT" >> $GITHUB_ENV

      - name: Check for new commits between branches
        id: check_new_commits
        run: |
          # Branches already fetched in previous step, verify they exist
          if ! git rev-parse origin/main origin/development >/dev/null 2>&1; then
            echo "Error: Required branches not found"
            exit 1
          fi
          
          if git rev-list --count origin/main..origin/development | grep -q '^0$'; then
            echo "No new commits to create a PR."
            echo "NEW_COMMITS=false" >> $GITHUB_ENV
          else
            echo "NEW_COMMITS=true" >> $GITHUB_ENV
          fi

      - name: Bump version number (patch increment)
        if: env.BUMP_VERSION == 'true' && env.NEW_COMMITS == 'true'
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
          fi

          if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(.*)$ ]]; then
          MAJOR=${BASH_REMATCH[1]}
          MINOR=${BASH_REMATCH[2]}
          PATCH=${BASH_REMATCH[3]}
          else
          echo "Invalid version format. Expected format: MAJOR.MINOR.PATCH"
          exit 1
          fi
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          jq --arg NEW_VERSION "$NEW_VERSION" '.version = $NEW_VERSION' package.json > package.tmp && mv package.tmp package.json

          echo "Updated version in package.json to $NEW_VERSION"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add package.json
          git commit -m "chore: bump version number on PR to main"

      - name: Create or update branch
        if: env.BUMP_VERSION == 'true' && env.NEW_COMMITS == 'true'
        run: |
          git checkout -b bump-version-branch || git checkout bump-version-branch
          git pull origin bump-version-branch || echo "Branch does not exist remotely."

      - name: Push changes to remote
        if: env.BUMP_VERSION == 'true' && env.NEW_COMMITS == 'true'
        run: |
          git push origin bump-version-branch || (echo "Retrying with force push..." && git push --force origin bump-version-branch)
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Create PR
        if: env.BUMP_VERSION == 'true' && env.NEW_COMMITS == 'true'
        run: |
          gh pr create --title "Bump Version on PR to Main" --body "This PR bumps the version number" --base development --head bump-version-branch
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Auto merge the pull request
        if: env.BUMP_VERSION == 'true' && env.NEW_COMMITS == 'true'
        run: |
          PR_NUMBER=$(gh pr list --state open --head bump-version-branch --json number --jq '.[0].number')
          gh pr merge $PR_NUMBER --admin --squash --delete-branch
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Create or update draft pull request
        if: env.NEW_COMMITS == 'true'
        run: |
          # Build PR body with proper formatting using $'...' for escape sequences
          # PR_COUNT is already calculated and set in the "Get merged PR titles for release" step
          if [ "$PR_COUNT" -gt 0 ]; then
            PR_BODY=$'## 📦 Changes in this release:\n\n'"${PR_TITLES}"$'\n\nThis release includes '"${PR_COUNT}"$' merged pull request(s) from the development branch.'
          else
            PR_BODY=$'## 📦 Changes in this release:\n\nThis release includes changes from the development branch.'
          fi
          
          # Check PR body length and truncate if necessary
          if [ ${#PR_BODY} -gt 65000 ]; then
            echo "⚠️  PR body too long (${#PR_BODY} characters), truncating..."
            PR_BODY="${PR_BODY:0:65000}"$'\n\n... (truncated due to length)'
          fi
          
          if [ "$PR_EXISTS" = "true" ]; then
            echo "A PR already exists: $PR_URL"
            echo "Updating PR title and body..."
            
            # Update PR with new title and body
            if gh pr edit "$PR_URL" --title "Draft PR for release version $NEW_VERSION" --body "$PR_BODY"; then
              echo "✅ Updated PR successfully"
            else
              echo "Error: Failed to update PR"
              exit 1
            fi
          else
            echo "Creating a new draft PR..."
            
            # Create new PR with body
            if gh pr create \
              --base main \
              --head development \
              --title "Draft PR for release version $NEW_VERSION" \
              --body "$PR_BODY" \
              --draft; then
              echo "✅ Created draft PR successfully"
            else
              echo "Error: Failed to create PR"
              exit 1
            fi
          fi
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
