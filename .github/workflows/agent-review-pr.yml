name: Agent Review PR

on:
  pull_request:
    types: [opened]
    branches: [main, development]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.base_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build review prompt
        id: prompt
        run: |
          source ./scripts/agents/config.sh
          log_file=$(clock_in "reviewer" "PR #${{ github.event.pull_request.number }}")

          head_ref="${{ github.event.pull_request.head.ref }}"
          if echo "$head_ref" | grep -q '^agent/'; then
            pr_context="This PR was opened by a bot agent (branch: ${head_ref}). It is automated code — hold it to the same standards but be aware it may follow mechanical patterns."
          else
            pr_context="This PR was opened by a human contributor (branch: ${head_ref}). Review it as you would any community contribution."
          fi

          prompt=$(sed \
            -e "s|\$PR_NUMBER|${{ github.event.pull_request.number }}|g" \
            -e "s|\$LOG_FILE|$log_file|g" \
            -e "s|\$PR_CONTEXT|${pr_context}|g" \
            ./scripts/agents/prompts/reviewer.md)
          echo "$prompt" > /tmp/review-prompt.txt
          echo "log_file=$log_file" >> "$GITHUB_OUTPUT"

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.bot-token.outputs.token }}
          display_report: "false"
          allowed_bots: "llm-exe-bot[bot]"
          prompt: |
            Read the file /tmp/review-prompt.txt for your full instructions. Follow them exactly.
          claude_args: |
            --allowedTools "Bash,Read,Glob,Grep,WebFetch"
            --max-turns 30
            --model claude-opus-4-6

      - name: Upload agent prompt
        if: steps.prompt.outputs.log_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: agent-prompt-${{ github.run_id }}
          path: /tmp/review-prompt.txt
          retention-days: 7

      - name: Approve PR (high confidence verdict only)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/review-verdict.txt ]; then
            echo "No verdict file found - skipping approval."
            exit 0
          fi
          verdict=$(cat /tmp/review-verdict.txt | tr -d '[:space:]')
          echo "Verdict: $verdict"
          if [ "$verdict" = "approve-high-confidence" ]; then
            gh pr review ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --approve \
              --body "Approved by reviewer agent (high confidence)."
            echo "PR approved."
          else
            echo "Verdict '$verdict' does not meet high-confidence threshold - no approval submitted."
          fi

      - name: Clock out
        if: always()
        run: |
          source ./scripts/agents/config.sh
          clock_out "${{ steps.prompt.outputs.log_file }}" "${{ job.status == 'success' && '0' || '1' }}"
