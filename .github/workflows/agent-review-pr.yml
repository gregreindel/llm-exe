name: Agent Review PR

on:
  pull_request:
    types: [opened]
    branches: [main, development]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Runs in parallel with review. Result is consumed by the decide job.
  # Mirrors tests.yml exactly (matrix, cache action, npm install, npm run test).
  # Coverage upload is intentionally omitted — that is tests.yml's responsibility on main PRs.
  tests:
    if: github.base_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Cache npm dependencies
        uses: ./.github/actions/cache

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  # Runs in parallel with tests. Exposes verdict as a job output for decide.
  review:
    if: github.base_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      verdict: ${{ steps.verdict.outputs.verdict }}

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build review prompt
        id: prompt
        run: |
          source ./scripts/agents/config.sh
          log_file=$(clock_in "reviewer" "PR #${{ github.event.pull_request.number }}")

          head_ref="${{ github.event.pull_request.head.ref }}"
          if echo "$head_ref" | grep -q '^agent/'; then
            pr_context="This PR was opened by a bot agent (branch: ${head_ref}). It is automated code - hold it to the same standards but be aware it may follow mechanical patterns."
          else
            pr_context="This PR was opened by a human contributor (branch: ${head_ref}). Review it as you would any community contribution."
          fi

          prompt=$(sed \
            -e "s|\$PR_NUMBER|${{ github.event.pull_request.number }}|g" \
            -e "s|\$LOG_FILE|$log_file|g" \
            -e "s|\$PR_CONTEXT|${pr_context}|g" \
            ./scripts/agents/prompts/reviewer.md)
          echo "$prompt" > /tmp/review-prompt.txt
          echo "log_file=$log_file" >> "$GITHUB_OUTPUT"

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.bot-token.outputs.token }}
          display_report: "false"
          allowed_bots: "llm-exe-bot[bot]"
          prompt: |
            Read the file /tmp/review-prompt.txt for your full instructions. Follow them exactly.
          claude_args: |
            --allowedTools "Bash,Read,Glob,Grep,WebFetch"
            --max-turns 30
            --model claude-opus-4-6

      - name: Upload agent prompt
        if: steps.prompt.outputs.log_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: agent-prompt-${{ github.run_id }}
          path: /tmp/review-prompt.txt
          retention-days: 7

      - name: Read verdict
        id: verdict
        if: always()
        run: |
          if [ -f /tmp/review-verdict.txt ]; then
            v=$(cat /tmp/review-verdict.txt | tr -d '[:space:]')
          else
            v="no-verdict"
          fi
          echo "verdict=$v" >> "$GITHUB_OUTPUT"

      - name: Clock out
        if: always()
        run: |
          source ./scripts/agents/config.sh
          clock_out "${{ steps.prompt.outputs.log_file }}" "${{ job.status == 'success' && '0' || '1' }}"

  # Waits for both tests and review. Approves only when both pass.
  # Uses GITHUB_TOKEN (github-actions[bot]) because the bot token cannot approve its own PRs.
  decide:
    needs: [tests, review]
    if: always() && github.base_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Approve or skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          verdict="${{ needs.review.outputs.verdict }}"
          tests_result="${{ needs.tests.result }}"

          echo "Review verdict : $verdict"
          echo "Tests result   : $tests_result"

          if [ "$verdict" = "approve" ] && [ "$tests_result" = "success" ]; then
            gh pr review ${{ github.event.pull_request.number }} \
              --approve \
              --body "Approved by reviewer agent (tests passing)." \
              --repo ${{ github.repository }}

            IS_DRAFT=$(gh pr view ${{ github.event.pull_request.number }} \
              --json isDraft --jq '.isDraft' \
              --repo ${{ github.repository }})
            if [ "$IS_DRAFT" = "true" ]; then
              gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
              echo "PR marked as ready for review."
            fi

            echo "PR #${{ github.event.pull_request.number }} approved."
          else
            echo "No approval submitted: verdict='$verdict', tests='$tests_result'."
          fi
