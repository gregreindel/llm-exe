name: Agent Run

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent to run"
        required: true
        type: choice
        options:
          - docs
          - tester
          - coder
          - beginner
          - harsh-critic
          - speed-runner
          - enterprise
          - personas
          - curator
          - all
  schedule:
    - cron: "0 6 * * *" # 6am UTC daily

concurrency:
  group: agent-${{ github.event.inputs.agent || 'scheduled' }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "llm-exe-bot"
          git config user.email "llm-exe-bot@users.noreply.github.com"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run agent
        run: |
          chmod +x ./scripts/maintain.sh
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            for agent in all docs tester coder; do
              echo "========================================="
              echo "  Running: $agent"
              echo "========================================="
              ./scripts/maintain.sh "$agent" || true
            done
          else
            ./scripts/maintain.sh "${{ github.event.inputs.agent }}"
          fi
